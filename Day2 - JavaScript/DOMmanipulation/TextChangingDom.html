<!DOCTYPE html>
<html>
    <head>
        <title>Modifying Text using DOM</title>
    </head>
    <body>
        <h1 id="IntroText">Hello Students</h1>
        <script>
            let element = document.getElementById("IntroText");
            
            element.innerHTML = "Welcome to Javascript class";
        </script>
    </body>
</html>
