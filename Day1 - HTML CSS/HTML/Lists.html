<!DOCTYPE html>
<html>
    <head>
        <title>Lists</title>
    </head>
    <body>
        <!--Unordered List - <ul>-->
        <ul>
            <!--List  Item- <li>-->
            <li>Item1</li>
            <li>Item2</li>
        </ul>
        <!--Ordered List-->
        <ol>
            <li>Item1</li>
            <li>Item2</li>
        </ol>
    </body>
</html>
