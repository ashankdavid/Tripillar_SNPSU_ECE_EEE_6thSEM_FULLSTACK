<!DOCTYPE html>
<html>
    <head>
        <title>My Webpage</title>
        <style>
            .container{
                display: grid;
                grid-template-columns: auto auto auto;
                background-color: chocolate;
                padding: 30px;
            }

            .container div{
                font-size: 50px;
                border: 1px solid black;
                padding: 10px;
                background-color: aquamarine;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class ="container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </body>
</html>
